<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>ScheduleRama CMS</title>
  </head>
  <body>
    <div id="nc-root"></div>
    <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.10.1/dist/decap-cms.js"></script>
    <script>
      CMS.registerCustomFormat('astro-raw', 'astro', {
        fromFile: function (text) {
          return { body: text || '' };
        },
        toFile: function (value) {
          return value && typeof value.body === 'string' ? value.body : '';
        },
      });
    </script>
  </body>
</html>
