<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>ScheduleRama CMS</title>
    <style>
      #cms-debug {
        position: fixed;
        right: 12px;
        bottom: 12px;
        width: min(640px, calc(100vw - 24px));
        max-height: 48vh;
        overflow: auto;
        background: rgba(15, 28, 48, 0.96);
        color: #fff;
        font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        padding: 10px 12px;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0,0,0,.28);
        z-index: 999999;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div id="nc-root"></div>
    <pre id="cms-debug">CMS debug initialized...</pre>
    <script>
      (function () {
        var el = document.getElementById('cms-debug');
        function log(msg) {
          if (!el) return;
          el.textContent += '\n' + msg;
        }

        function dumpStorage(prefix) {
          try {
            var keys = [];
            for (var i = 0; i < localStorage.length; i += 1) keys.push(localStorage.key(i));
            log(prefix + ' localStorage keys=' + JSON.stringify(keys));
            keys.forEach(function (key) {
              var value = localStorage.getItem(key);
              if ((key && key.toLowerCase().indexOf('cms') !== -1) || (key && key.toLowerCase().indexOf('github') !== -1) || (key && key.toLowerCase().indexOf('netlify') !== -1) || (key && key.toLowerCase().indexOf('decap') !== -1)) {
                log(prefix + ' ' + key + '=' + value);
              }
            });
          } catch (error) {
            log(prefix + ' storage read failed: ' + (error && error.message ? error.message : String(error)));
          }
        }

        var originalSetItem = Storage.prototype.setItem;
        Storage.prototype.setItem = function (key, value) {
          log('[storage.setItem] ' + key + '=' + value);
          return originalSetItem.apply(this, arguments);
        };

        var originalFetch = window.fetch;
        window.fetch = function () {
          var url = arguments[0];
          var requestUrl = typeof url === 'string' ? url : (url && url.url ? url.url : String(url));
          log('[fetch] ' + requestUrl);
          return originalFetch.apply(this, arguments).then(function (response) {
            log('[fetch:response] ' + requestUrl + ' -> ' + response.status + ' ' + response.type);
            return response;
          }).catch(function (error) {
            log('[fetch:error] ' + requestUrl + ' -> ' + (error && error.message ? error.message : String(error)));
            throw error;
          });
        };

        var OriginalXHR = window.XMLHttpRequest;
        function DebugXHR() {
          var xhr = new OriginalXHR();
          var open = xhr.open;
          xhr.open = function (method, url) {
            xhr.__debugUrl = url;
            log('[xhr] ' + method + ' ' + url);
            return open.apply(xhr, arguments);
          };
          xhr.addEventListener('load', function () {
            log('[xhr:response] ' + (xhr.__debugUrl || '') + ' -> ' + xhr.status);
          });
          xhr.addEventListener('error', function () {
            log('[xhr:error] ' + (xhr.__debugUrl || ''));
          });
          return xhr;
        }
        window.XMLHttpRequest = DebugXHR;

        window.addEventListener('message', function (event) {
          var data = typeof event.data === 'string' ? event.data : JSON.stringify(event.data);
          log('[message] origin=' + event.origin + ' data=' + data);
          setTimeout(function () { dumpStorage('[after message]'); }, 300);
        });
        window.addEventListener('error', function (event) {
          log('[error] ' + (event.message || 'unknown error'));
        });
        window.addEventListener('unhandledrejection', function (event) {
          var reason = event.reason && event.reason.message ? event.reason.message : String(event.reason);
          log('[rejection] ' + reason);
        });
        log('[ready] location=' + window.location.href);
        dumpStorage('[ready]');
      })();
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/decap-cms@3.10.1/dist/decap-cms.js"></script>
  </body>
</html>
