backend:
  name: github
  repo: geekypepito/schedulerama-site
  branch: main
  site_domain: www.schedulerama.com
  base_url: https://www.schedulerama.com
  auth_endpoint: /cms-auth/auth

media_folder: public/images
public_folder: /images

collections:
  - name: site_pages
    label: Site Pages
    files:
      - label: Home
        name: home
        file: src/pages/index.astro
        fields:
          - { label: Source, name: body, widget: code, default_language: html, output_code_only: true }
      - label: About
        name: about
        file: src/pages/about.astro
        fields:
          - { label: Source, name: body, widget: code, default_language: html, output_code_only: true }
